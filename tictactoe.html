<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.4rem;
      min-height: 1.6rem;
      color: #c4b5fd;
      letter-spacing: 1px;
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.6rem;
    }

    .score-block {
      text-align: center;
    }

    .score-label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: #6b7280;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 2rem;
      font-weight: 700;
    }

    .score-x { color: #a78bfa; }
    .score-o { color: #60a5fa; }
    .score-tie { color: #9ca3af; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #1e1b2e;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      font-weight: 800;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      border: 2px solid #2d2a45;
    }

    .cell:hover:not(.taken) {
      background: #2a2640;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }
    .cell.x { color: #a78bfa; }
    .cell.o { color: #60a5fa; }

    .cell.win {
      background: #2d1f52;
      border-color: #7c3aed;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #reset-btn {
      margin-top: 1.8rem;
      padding: 0.65rem 2rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      color: #fff;
      font-size: 0.95rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #reset-btn:hover { opacity: 0.85; transform: scale(1.03); }
    #reset-btn:active { transform: scale(0.97); }

    #mode-toggle {
      margin-top: 0.8rem;
      padding: 0.5rem 1.5rem;
      border: 1px solid #3f3a60;
      border-radius: 8px;
      background: transparent;
      color: #9ca3af;
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    #mode-toggle:hover { color: #c4b5fd; border-color: #7c3aed; }
  </style>
</head>
<body>

  <h1>Tic-Tac-Toe</h1>
  <div id="status">X's turn</div>

  <div id="scoreboard">
    <div class="score-block">
      <div class="score-label">X</div>
      <div class="score-value score-x" id="score-x">0</div>
    </div>
    <div class="score-block">
      <div class="score-label">Ties</div>
      <div class="score-value score-tie" id="score-tie">0</div>
    </div>
    <div class="score-block">
      <div class="score-label">O</div>
      <div class="score-value score-o" id="score-o">0</div>
    </div>
  </div>

  <div id="board"></div>
  <button id="reset-btn">New Game</button>
  <button id="mode-toggle">vs Computer: OFF</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, vsComputer;
    const scores = { X: 0, O: 0, tie: 0 };

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('reset-btn');
    const modeBtn = document.getElementById('mode-toggle');

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      renderBoard();
      statusEl.textContent = "X's turn";
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ' taken ' + val.toLowerCase() : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (vsComputer && current === 'O') return;
      play(i);
      if (vsComputer && !gameOver && current === 'O') {
        setTimeout(computerMove, 350);
      }
    }

    function play(i) {
      board[i] = current;
      const cells = boardEl.querySelectorAll('.cell');
      cells[i].textContent = current;
      cells[i].classList.add('taken', current.toLowerCase());

      const winner = checkWinner();
      if (winner) {
        highlight(winner.line);
        scores[current]++;
        updateScores();
        statusEl.textContent = `${current} wins!`;
        gameOver = true;
      } else if (board.every(Boolean)) {
        scores.tie++;
        updateScores();
        statusEl.textContent = "It's a tie!";
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        statusEl.textContent = `${current}'s turn${vsComputer && current === 'O' ? ' (thinking...)' : ''}`;
      }
    }

    function checkWinner() {
      for (const line of WINS) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { player: board[a], line };
        }
      }
      return null;
    }

    function highlight(line) {
      const cells = boardEl.querySelectorAll('.cell');
      line.forEach(i => cells[i].classList.add('win'));
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-tie').textContent = scores.tie;
    }

    function computerMove() {
      const move = bestMove();
      play(move);
    }

    function bestMove() {
      // Try to win
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          if (checkWinner()) { board[i] = null; return i; }
          board[i] = null;
        }
      }
      // Block X from winning
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'X';
          if (checkWinner()) { board[i] = null; return i; }
          board[i] = null;
        }
      }
      // Take center
      if (!board[4]) return 4;
      // Take a corner
      for (const c of [0, 2, 6, 8]) {
        if (!board[c]) return c;
      }
      // Take any open cell
      return board.findIndex(v => !v);
    }

    resetBtn.addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = `vs Computer: ${vsComputer ? 'ON' : 'OFF'}`;
      scores.X = scores.O = scores.tie = 0;
      updateScores();
      init();
    });

    vsComputer = false;
    init();
  </script>
</body>
</html>
